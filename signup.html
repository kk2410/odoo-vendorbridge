<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – VendorBridge ERP</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container p-3">
        <div class="forgot-card p-5 mx-auto">
            <div class="text-center mb-4">
                <span class="fs-2 fw-bold text-dark"><i class="fa-solid fa-cubes text-primary me-2"></i>VendorBridge</span>
                <p class="text-muted mt-2 small">Reset your password via console mock-up email</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-bold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-envelope text-secondary"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 bg-light" placeholder="email@example.com" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-semibold shadow-sm">Reset Password</button>
            </form>

            <div class="text-center mt-4 pt-2 border-top">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none small fw-semibold">Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
